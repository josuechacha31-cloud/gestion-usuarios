<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Jefatura - Empresa "X"</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="admin-body">

<div class="dashboard-container">
    <header class="admin-header-compact">
        <div class="logo-area">
            <img src="favicon.ico" alt="Logo" class="header-logo">
            <div class="title-text">
                <h1>Empresa "X"</h1>
                <p class="subnet">Panel de Jefatura / Control de Equipo</p>
            </div>
        </div>
        <div class="user-profile">
            <div class="user-info">
                <span class="user-name" id="jefe-name">Cargando...</span>
                <span class="user-role">Jefe de Área</span>
            </div>
            <button onclick="cerrarSesion()" class="btn-logout-modern">Salir 🚪</button>
        </div>
    </header>

    <div class="admin-table-container card">
        <h3>🚨 Solicitudes de Permiso Pendientes</h3>
        <table id="tabla-permisos">
            <thead>
            <tr>
                <th>Empleado</th>
                <th>Fecha</th>
                <th>Horario</th>
                <th>Total</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody id="lista-permisos">
            </tbody>
        </table>
    </div>
    <div class="admin-table-container card">
        <h3 style="margin-bottom: 15px;">📊 Marcaciones de mi Equipo</h3>

        <div class="search-bar-container"
             style="display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; background: #f8fafc; padding: 10px; border-radius: 8px;">
            <input type="text" id="filtro-nombre-jefe" placeholder="🔍 Buscar por apellido o nombre..."
                   onkeyup="renderizarAsistenciasJefe()" style="flex: 1; min-width: 200px; margin: 0;">
            <input type="date" id="filtro-desde-jefe" onchange="filtrarFechasJefe()" style="width: auto; margin: 0;"
                   title="Desde Fecha">
            <input type="date" id="filtro-hasta-jefe" onchange="filtrarFechasJefe()" style="width: auto; margin: 0;"
                   title="Hasta Fecha">
            <button onclick="limpiarFiltrosJefe()" class="btn-secondary"
                    style="width: auto; margin: 0; padding: 8px 15px;">Limpiar
            </button>
        </div>

        <table id="tabla-monitoreo">
            <thead>
            <tr>
                <th>Empleado</th>
                <th>Tipo</th>
                <th>Fecha y Hora</th>
            </tr>
            </thead>
            <tbody id="lista-asistencias-equipo"></tbody>
        </table>
    </div>

    <div class="admin-table-container card">
        <h3>📊 Marcaciones Recientes de mi Equipo</h3>
        <table id="tabla-monitoreo">
            <thead>
            <tr>
                <th>Empleado</th>
                <th>Tipo</th>
                <th>Fecha y Hora</th>
            </tr>
            </thead>
            <tbody id="lista-asistencias-equipo">
            </tbody>
        </table>
    </div>
</div>

<script src="app.js"></script>
<script>
    window.onload = () => {
        verificarAcceso('Jefe');
        const user = JSON.parse(sessionStorage.getItem('usuario_logueado'));
        if (user) {
            document.getElementById('jefe-name').innerText = `${user.nombre} ${user.apellido}`;
            cargarPermisosJefe();
            cargarAsistenciasEquipo();
        }
    };
</script>
</body>
</html>
