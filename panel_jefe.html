<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Control | Jefatura</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
<div class="container dash-container">
    <div class="card user-header">
        <h1>Panel de Jefatura</h1>
        <p>Bienvenido, <span id="jefe-name"></span></p>

        <div class="admin-table-container">
            <h3>Solicitudes de Permiso Pendientes</h3>
            <table>
                <thead>
                <tr>
                    <th>Empleado</th>
                    <th>Fecha</th>
                    <th>Horas</th>
                    <th>Acción</th>
                </tr>
                </thead>
                <tbody id="lista-permisos">
                </tbody>
            </table>
        </div>
        <button class="logout-btn" onclick="logout()">Cerrar Sesión</button>
    </div>
</div>
<script src="app.js"></script>
<script>
    window.onload = () => {
        const user = JSON.parse(sessionStorage.getItem('usuario_logueado'));
        if (!user || !user.roles || user.roles.nombre_rol !== 'Jefe') {
            window.location.href = 'index.html';
        } else {
            document.getElementById('jefe-name').innerText = user.nombre;
            cargarSolicitudes(user.id);
        }
    };
</script>
</body>
</html>
