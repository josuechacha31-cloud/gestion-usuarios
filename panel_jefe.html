<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Control | Jefatura</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
<div class="dashboard-container">
    <div class="header-card-modern">
        <h2>Panel de Control | Jefatura</h2>
        <p>Gestión y Revisión de Solicitudes de Permiso</p>
    </div>

    <div class="admin-table-container card">
        <h3>Solicitudes Pendientes de Mi Equipo</h3>
        <table>
            <thead>
            <tr>
                <th>Empleado</th>
                <th>Fecha Permiso</th>
                <th>Horario</th>
                <th>Total Horas</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody id="lista-permisos">
            </tbody>
        </table>
    </div>
</div>
<script src="app.js"></script>
<script>
    window.onload = () => {
        verificarAcceso('Jefe');
        const user = JSON.parse(sessionStorage.getItem('usuario_logueado'));
        if (user) {
            document.getElementById('jefe-name').innerText = `${user.nombre} ${user.apellido}`;
            cargarPermisosJefe();
        }
    };
</script>
</body>
</html>
