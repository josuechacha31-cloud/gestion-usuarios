<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Administrador - Empresa "X"</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="admin-body">

<div class="dashboard-container">
    <div class="logo-area">
        <img src="favicon.ico" alt="Logo" class="header-logo">
        <div class="title-group">
            <h1>Empresa "X"</h1>
            <span class="subnet">Panel Administrativo</span>
        </div>
    </div>
    <div class="user-nav-area">
        <div class="user-profile">
            <div class="user-info">
                <span id="admin-name" class="user-name">Cargando...</span>
                <span class="user-role">Administrador</span>
            </div>
        </div>
        <button onclick="cerrarSesion()" class="btn-logout-modern" title="Cerrar Sesión">
            SALIR <span>🚪</span>
        </button>
    </div>
</div>

<div class="dashboard-container">
    <div class="header-card-modern"
         style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <div>
            <h2 style="margin:0;">Gestión de Personal</h2>
            <p style="color: #64748b; margin:0; font-size: 0.9rem;">Administración de usuarios y permisos - Empresa
                "X"</p>
        </div>
    </div>
    <div class="action-bar card">
        <div class="search-group">
            <span class="search-icon">🔍</span>
            <input type="text" id="buscador-usuarios" placeholder="Buscar empleado..." onkeyup="filtrarUsuarios()">
        </div>
        <div class="buttons-group">
            <button onclick="abrirModalCrear()" class="btn-primary">➕ Nuevo Empleado</button>
            <button onclick="verAuditoria()" class="btn-secondary">📋 Ver Logs</button>
        </div>
    </div>

    <div class="admin-table-container card">
        <h3>Gestión de Personal</h3>
        <table id="tabla-usuarios">
            <thead>
            <tr>
                <th>Nombre Completo</th>
                <th>Cédula</th>
                <th>Correo Electrónico</th>
                <th>Cargo</th>
                <th>Rol</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody id="cuerpo-tabla">
            </tbody>
        </table>
    </div>
</div>

<div id="modal-container"></div>

<script src="app.js"></script>
<script>
    // Carga inicial al abrir el panel
    window.onload = function () {
        verificarAcceso('Administrador'); // Seguridad RBAC
        const user = JSON.parse(sessionStorage.getItem('usuario_logueado'));
        if (user) document.getElementById('admin-name').innerText = `${user.nombre} ${user.apellido}`;
        listarUsuarios(); // Carga la tabla
    };
</script>
</body>
</html>
