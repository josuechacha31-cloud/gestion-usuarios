<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Administrador - Empresa "X"</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="admin-body">
<div class="header-card" style="background: linear-gradient(135deg, #0f172a 0%, #1e293b 55%, #10b981 100%);">
    <div>
        <h1>Agrupaciones de Roles (Automáticas)</h1>
        <p>Clasificador interno para generación de roles de pago por bloques presupuestarios.</p>
    </div>
</div>

<header class="admin-header">
    <div class="header-container">
        <div class="logo-area">
            <img src="favicon.ico" alt="Logo" class="header-logo">
            <h1>Empresa "X" <span class="subnet">| Panel Control</span></h1>
        </div>
        <div class="user-area">
            <span id="admin-name">Administrador</span>
            <button onclick="cerrarSesion()" class="btn-logout">Cerrar Sesión</button>
        </div>
    </div>
</header>

<div class="dashboard-container">

    <div class="action-bar card">
        <div class="search-group">
            <input type="text" id="buscador-usuarios" placeholder="Buscar por nombre, cédula o correo..."
                   onkeyup="filtrarUsuarios()">
            <span class="search-icon">🔍</span>
        </div>
        <div class="buttons-group">
            <button onclick="abrirModalCrear()" class="btn-primary">➕ Nuevo Empleado</button>
            <button onclick="verAuditoria()" class="btn-secondary">📋 Ver Logs (Auditoría)</button>
        </div>
    </div>

    <div class="admin-table-container card">
        <h3>Gestión de Personal</h3>
        <table id="tabla-usuarios">
            <thead>
            <tr>
                <th>Nombre Completo</th>
                <th>Cédula</th>
                <th>Correo Electrónico</th>
                <th>Cargo</th>
                <th>Rol</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody id="cuerpo-tabla">
            </tbody>
        </table>
    </div>
</div>

<div id="modal-container"></div>

<script src="app.js"></script>
<script>
    // Carga inicial al abrir el panel
    window.onload = function () {
        verificarAcceso('Administrador'); // Seguridad RBAC
        const user = JSON.parse(sessionStorage.getItem('usuario_logueado'));
        if (user) document.getElementById('admin-name').innerText = `${user.nombre} ${user.apellido}`;
        listarUsuarios(); // Carga la tabla
    };
</script>
</body>
</html>
