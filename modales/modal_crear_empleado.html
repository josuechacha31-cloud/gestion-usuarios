<div id="contenedor-modal" class="modal-overlay">
    <div class="card modal-content">
        <div class="modal-header">
            <h3>Registrar/Editar Empleado - Empresa "X"</h3>
            <button onclick="cerrarModal()" class="btn-close-modal">×</button>
        </div>

        <form id="form-crear-usuario" class="grid-form-2-col">
            <div class="form-section">
                <h4>Información Personal</h4>
                <div class="form-group">
                    <label>Nombres *</label>
                    <input type="text" id="new-name" required>
                </div>
                <div class="form-group">
                    <label>Apellidos *</label>
                    <input type="text" id="new-lastname" required>
                </div>
                <div class="form-group">
                    <label>Cédula/DNI *</label>
                    <input type="text" id="new-cedula" required>
                </div>
                <div class="form-group">
                    <label>Correo Electrónico *</label>
                    <input type="email" id="new-email" required>
                </div>
            </div>

            <div class="form-section">
                <h4>Información Laboral</h4>

                <div class="form-group">
                    <label>Contraseña *</label>
                    <input type="password" id="new-password" required>
                </div>
                <div class="form-group">
                    <label>Cargo</label>
                    <input type="text" id="new-cargo">
                </div>
                <div class="form-group">
                    <label>Remuneración ($)</label>
                    <input type="number" id="new-salary" step="0.01">
                </div>
                <div class="form-group">
                    <label>Rol de Acceso *</label>
                    <select id="new-role" required>
                        <option value="1">Administrador</option>
                        <option value="2">Empleado</option>
                        <option value="3">Jefe</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Asignar Jefe (Si aplica)</label>
                    <select id="new-jefe">
                        <option value="">Cargando jefes...</option>
                    </select>
                </div>
            </div>
        </form>

        <div class="modal-footer">
            <button onclick="cerrarModal()" class="btn-secondary">Cancelar</button>
            <button id="btn-guardar-persona" onclick="crearPersona()" class="btn-primary">💾 Guardar</button>
        </div>
    </div>
</div>
